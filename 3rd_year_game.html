<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>¡ESPAÑOL! · 3rd Year</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0c29;--card:#1a1650;
  --red:#e74c3c;--yellow:#f1c40f;--green:#27ae60;--blue:#3498db;--pink:#e91e8c;--purple:#9b59b6;
  --ink:#1a1a2e;--white:#ffffff;--muted:rgba(255,255,255,0.38);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--white);overscroll-behavior:none;}
.screen{display:none;height:100%;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;}
.screen.on{display:flex;}

/* ── FLOATING EMOJIS ── */
.floater{position:fixed;pointer-events:none;z-index:9999;font-size:1.8rem;animation:floatUp 0.9s ease forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(0.5);}100%{opacity:0;transform:translateY(-90px) scale(1.4);}}

/* ══ HOME ══ */
#home{background:linear-gradient(160deg,#0f0c29 0%,#302b63 55%,#24243e 100%);overflow-y:auto;}
.home-head{text-align:center;padding:26px 20px 10px;}
.flag{font-size:3.2rem;display:inline-block;animation:swing 2.5s ease-in-out infinite;}
@keyframes swing{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.home-title{font-family:'Baloo 2',cursive;font-size:2.7rem;font-weight:900;letter-spacing:-1px;line-height:1;
  background:linear-gradient(90deg,var(--yellow),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-sub{color:var(--muted);font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.xp-wrap{margin:12px 18px 4px;}
.xp-meta{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);font-weight:800;margin-bottom:5px;}
.xp-track{height:9px;background:rgba(255,255,255,0.1);border-radius:50px;overflow:hidden;}
.xp-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green));transition:width 0.6s;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 28px;}
.tile{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.09);border-radius:18px;
  padding:14px 12px 12px;cursor:pointer;transition:transform 0.14s,border-color 0.2s;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;}
.tile:active{transform:scale(0.94);}
.tile.best{border-color:rgba(241,196,15,0.55);}
.tile.locked{opacity:0.28;cursor:default;}
.tile-stripe{position:absolute;top:0;left:0;right:0;height:4px;border-radius:18px 18px 0 0;}
.tile-icon{font-size:1.9rem;display:block;margin-bottom:5px;}
.tile-name{font-weight:900;font-size:0.85rem;line-height:1.25;color:var(--white);flex:1;}
.tile-month{font-size:0.58rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;}
.tile-stars{font-size:0.82rem;margin-top:5px;display:block;min-height:1.1em;}
.tile-lock{position:absolute;top:9px;right:10px;font-size:0.85rem;opacity:0.45;}

/* ══ LEVELS ══ */
#levels{background:var(--bg);}
.nav{display:flex;align-items:center;gap:10px;padding:13px 16px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.nav-back{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:2px 8px 2px 0;line-height:1;}
.nav-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.15rem;flex:1;}
.lev-list{flex:1;overflow-y:auto;padding:14px 16px;}
.lev-row{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.08);border-radius:14px;
  padding:13px 15px;margin-bottom:9px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:border-color 0.2s;}
.lev-row:active{background:rgba(255,255,255,0.1);}
.lev-row.lev-best{border-color:rgba(241,196,15,0.45);}
.lev-row.lev-locked{opacity:0.28;cursor:default;}
.lev-num{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:900;color:var(--yellow);width:30px;flex-shrink:0;}
.lev-info{flex:1;}
.lev-name{font-weight:800;font-size:0.92rem;}
.lev-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.lev-stars{font-size:1rem;}

/* ══ GAME ══ */
#game{background:#f5f3ff;}
.ghdr{background:var(--ink);display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;}
.ghdr-back{background:none;border:none;color:rgba(255,255,255,0.45);font-size:1.3rem;cursor:pointer;line-height:1;}
.ghdr-name{font-family:'Baloo 2',cursive;font-weight:800;color:white;font-size:0.88rem;flex:1;}
.ghdr-score{font-family:'Baloo 2',cursive;font-weight:900;color:var(--yellow);font-size:1.05rem;}
.timer-wrap{height:6px;background:rgba(0,0,0,0.15);flex-shrink:0;}
.timer-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));transition:width 0.15s linear;transform-origin:left;}
.q-dots{display:flex;gap:4px;padding:10px 16px 0;flex-shrink:0;}
.qdot{flex:1;height:5px;border-radius:3px;background:#ddd;}
.qdot.ok{background:var(--green);}
.qdot.no{background:var(--red);}
.qdot.now{background:var(--blue);}
.gbody{flex:1;overflow-y:auto;padding:16px 16px 24px;}
.q-label{font-size:0.67rem;color:#aaa;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.q-main{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.42rem;color:var(--ink);line-height:1.3;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{background:white;border:2.5px solid #e2ddf5;border-radius:14px;padding:13px 15px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:0.98rem;color:var(--ink);
  cursor:pointer;display:flex;align-items:center;gap:11px;transition:all 0.12s;text-align:left;width:100%;}
.opt:active{transform:scale(0.97);}
.opt.correct{background:#eafaf1;border-color:var(--green);color:#1a6b3c;}
.opt.wrong{background:#fdecea;border-color:var(--red);color:#922b21;}
.opt.reveal{background:#eafaf1;border-color:var(--green);color:#1a6b3c;opacity:0.7;}
.opt-ltr{width:28px;height:28px;border-radius:50%;background:#ede8f5;display:flex;align-items:center;
  justify-content:center;font-size:0.72rem;font-weight:900;flex-shrink:0;color:#666;}
.opt.correct .opt-ltr{background:var(--green);color:white;}
.opt.wrong .opt-ltr{background:var(--red);color:white;}
.opt.reveal .opt-ltr{background:var(--green);color:white;}
.fb-bar{border-radius:14px;padding:12px 16px;font-weight:800;font-size:0.9rem;margin-top:12px;display:none;}
.fb-bar.on{display:block;animation:pop 0.18s ease;}
.fb-bar.fbgood{background:#eafaf1;color:#1a6b3c;border:2px solid #a9dfbf;}
.fb-bar.fbbad{background:#fdecea;color:#922b21;border:2px solid #f1948a;}
@keyframes pop{from{transform:scale(0.94);}to{transform:scale(1);}}
.nxt-btn{background:var(--ink);color:white;border:none;border-radius:14px;padding:15px;
  font-family:'Baloo 2',cursive;font-size:1.08rem;font-weight:800;cursor:pointer;
  width:100%;margin-top:12px;display:none;}
.nxt-btn.on{display:block;animation:pop 0.18s ease;}

/* ══ RESULTS ══ */
#results{background:linear-gradient(160deg,#0f0c29,#302b63);align-items:center;justify-content:center;overflow-y:auto;padding:28px 20px;}
.res{max-width:400px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px 16px;}
.res-em{font-size:5rem;display:block;margin-bottom:8px;animation:pop 0.4s ease;}
.res-title{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:900;margin-bottom:4px;}
.res-frac{font-family:'Baloo 2',cursive;font-size:3.6rem;font-weight:900;line-height:1;}
.res-time{font-size:0.8rem;color:var(--muted);margin:4px 0 8px;}
.res-stars{font-size:2.2rem;margin-bottom:4px;}
.res-xp{font-size:0.88rem;color:var(--yellow);font-weight:800;margin-bottom:22px;}
.missed-box{background:rgba(255,255,255,0.06);border-radius:14px;padding:14px 16px;margin-bottom:20px;text-align:left;max-height:210px;overflow-y:auto;}
.missed-hdr{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-bottom:10px;}
.missed-row{font-size:0.85rem;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.06);line-height:1.4;}
.missed-row:last-child{border:none;}
.missed-q{font-size:0.75rem;color:var(--muted);}
.missed-a{color:var(--green);}
.btn-again{width:100%;padding:16px;background:var(--yellow);color:var(--ink);border:none;
  border-radius:14px;font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:900;cursor:pointer;margin-bottom:10px;}
.btn-home{width:100%;padding:14px;background:rgba(255,255,255,0.07);color:white;
  border:2px solid rgba(255,255,255,0.12);border-radius:14px;font-family:'Baloo 2',cursive;
  font-size:1rem;font-weight:800;cursor:pointer;}

@media(max-width:360px){
  .home-title{font-size:2.2rem;}
  .q-main{font-size:1.25rem;}
  .opt{font-size:0.92rem;}
}
</style>
<script src="code-engine.js"></script>
<script src="code-ui.js"></script>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen on">
  <div class="home-head">
    <span class="flag">🇪🇸</span>
    <div class="home-title">¡ESPAÑOL!</div>
    <div class="home-sub">3rd Year Spanish</div>
  </div>
  <div class="xp-wrap">
    <div class="xp-meta"><span>⭐ Total Stars</span><span id="xp-label">0 / 0</span></div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
  <div class="grid" id="tile-grid"></div>
</div>

<!-- LEVELS -->
<div id="levels" class="screen">
  <div class="nav">
    <button class="nav-back" onclick="show('home')">←</button>
    <div class="nav-title" id="lev-title"></div>
    <span id="lev-icon" style="font-size:1.4rem"></span>
  </div>
  <div class="lev-list" id="lev-list"></div>
</div>

<!-- MODE PICKER -->
<div id="modepick" class="screen">
  <div class="res" style="gap:14px;">
    <div id="mp-icon" style="font-size:2.5rem;"></div>
    <div id="mp-name" style="font-family:'Baloo 2',cursive;font-weight:900;font-size:1.2rem;color:#fff;text-align:center;"></div>
    <div style="font-size:0.75rem;color:rgba(255,255,255,0.7);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;">Choose your mode</div>
    <button class="btn-again" style="background:#27ae60;" onclick="pickMode('normal')">⚡ Normal — stars &amp; high scores</button>
    <button class="btn-again" style="background:#e67e22;" onclick="pickMode('knockout')">🥊 Knockout — time is your score</button>
    <button class="btn-again" style="background:#e74c3c;" onclick="pickMode('endurance')">💀 Endurance — one mistake and it's over</button>
    <button class="btn-home" onclick="show('levels')">← Back</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="ghdr">
    <button class="ghdr-back" onclick="quitGame()">←</button>
    <div class="ghdr-name" id="ghdr-name"></div>
    <div class="ghdr-score" id="ghdr-score">0 / 0</div>
  </div>
  <div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
  <div class="q-dots" id="q-dots"></div>
  <div class="gbody">
    <div class="q-label" id="q-label"></div>
    <div class="q-main" id="q-main"></div>
    <div class="opts" id="opts"></div>
    <div class="fb-bar" id="fb-bar"></div>
    <button class="nxt-btn" id="nxt-btn" onclick="nextQ()">Siguiente →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="res">
    <span class="res-em" id="res-em"></span>
    <div class="res-title" id="res-title"></div>
    <div class="res-frac" id="res-frac"></div>
    <div class="res-time" id="res-time"></div>
    <div class="res-stars" id="res-stars"></div>
    <div class="res-xp" id="res-xp"></div>
    <div class="missed-box" id="missed-box" style="display:none">
      <div class="missed-hdr">What you missed</div>
      <div id="missed-list"></div>
    </div>
    <button class="btn-again" onclick="replayGame()">¡Otra vez! →</button>
    <button class="btn-home" onclick="show('home');renderHome()">← All Topics</button>
  </div>
</div>

// ══ TILE COLOURS ══
const STRIPES = ['#9b59b6','#3498db','#e67e22','#27ae60','#e74c3c','#e91e8c','#3498db','#9b59b6','#e67e22','#1abc9c','#e74c3c','#27ae60'];

// ══ TIME PER QUESTION ══
const TIME_PER_Q = 15;

// ══ STATE ══
let curTopic = null, curLevel = 0, curQs = [], curIdx = 0;
let correct = 0, wrong = 0, missed = [];
let timerID = null, timeLeft = 0, startTime = 0, totalSec = 0;
let answered = false;
let gameMode = 'normal';
let penaltySec = 0;

// ══ STORAGE ══
function sk(id,lv){return 'esp3_'+id+'_'+lv;}
function getBest(id,lv){return parseInt(localStorage.getItem(sk(id,lv))||'0');}
function setBest(id,lv,s){if(s>getBest(id,lv))localStorage.setItem(sk(id,lv),s);}
function totalStars(){
  return TOPICS.reduce((t,tp)=>t+tp.levels.reduce((s,_,i)=>s+getBest(tp.id,i),0),0);
}
function maxStars(){
  return TOPICS.reduce((t,tp)=>t+(tp.levels.length*3),0);
}

// ══ SCREEN ══
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ══ HOME ══
function renderHome(){
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  TOPICS.forEach((tp,ti)=>{
    const totalLevStars = tp.levels.reduce((s,_,i)=>s+getBest(tp.id,i),0);
    const maxLevStars   = tp.levels.length*3;
    const done = totalLevStars === maxLevStars && maxLevStars>0;
    const tile = document.createElement('div');
    tile.className = 'tile'+(done?' best':'');
    tile.innerHTML =
      `<div class="tile-stripe" style="background:${STRIPES[ti%STRIPES.length]}"></div>
       <span class="tile-icon">${tp.icon}</span>
       <div class="tile-name">${tp.name}</div>
       <div class="tile-month">${tp.month}</div>
       <span class="tile-stars">${starStr(totalLevStars,maxLevStars)}</span>`;
    tile.addEventListener('click',()=>openTopic(ti));
    grid.appendChild(tile);
  });
  const ts = totalStars(), ms = maxStars();
  document.getElementById('xp-label').textContent = ts+' / '+ms+' ⭐';
  document.getElementById('xp-fill').style.width = (ms?Math.round(ts/ms*100):0)+'%';
}

function starStr(got,max){
  if(!max) return '';
  const pct = got/max;
  if(pct>=1) return '⭐⭐⭐';
  if(pct>=0.66) return '⭐⭐☆';
  if(pct>0) return '⭐☆☆';
  return '☆☆☆';
}

// ══ LEVELS ══
function openTopic(ti){
  curTopic = ti;
  const tp = TOPICS[ti];
  document.getElementById('lev-title').textContent = tp.name;
  document.getElementById('lev-icon').textContent = tp.icon;
  const list = document.getElementById('lev-list');
  list.innerHTML = '';
  tp.levels.forEach((lv,li)=>{
    const best = getBest(tp.id,li);
    const row = document.createElement('div');
    row.className = 'lev-row'+(best===3?' lev-best':'');
    row.innerHTML =
      `<div class="lev-num">${li+1}</div>
       <div class="lev-info">
         <div class="lev-name">${lv.name}</div>
         <div class="lev-sub">${lv.qs.length} questions</div>
       </div>
       <div class="lev-stars">${'⭐'.repeat(best)+'☆'.repeat(3-best)}</div>`;
    row.addEventListener('click',()=>openModePicker(ti,li));
    list.appendChild(row);
  });
  show('levels');
}

// ══ GAME ══
function openModePicker(ti,li){
  curTopic = ti; curLevel = li;
  const tp = TOPICS[ti];
  document.getElementById('mp-icon').textContent = tp.icon;
  document.getElementById('mp-name').textContent = tp.name+' · '+tp.levels[li].name;
  show('modepick');
}

function pickMode(mode){
  gameMode = mode;
  startGame(curTopic, curLevel);
}

function startGame(ti,li){
  curTopic = ti; curLevel = li;
  const tp = TOPICS[ti];
  const lv = tp.levels[li];
  curQs = shuffle([...lv.qs]);
  curIdx = 0; correct = 0; wrong = 0; missed = []; totalSec = 0; penaltySec = 0; answered = false;
  const modeBadge = gameMode==='knockout'?' 🥊':gameMode==='endurance'?' 💀':'';
  document.getElementById('ghdr-name').textContent = tp.name+' · '+lv.name+modeBadge;
  document.getElementById('ghdr-score').textContent = '0 / '+curQs.length;

  const dots = document.getElementById('q-dots');
  dots.innerHTML = '';
  curQs.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'qdot'+(i===0?' now':'');
    d.id = 'dot-'+i;
    dots.appendChild(d);
  });

  show('game');
  showQ();
}

function showQ(){
  answered = false;
  const q = curQs[curIdx];
  document.getElementById('q-label').textContent = 'Question '+(curIdx+1)+' of '+curQs.length;
  document.getElementById('q-main').textContent = q.q;
  document.getElementById('fb-bar').className = 'fb-bar';
  document.getElementById('nxt-btn').className = 'nxt-btn';

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  const wrap = shuffle([...q.o]);
  wrap.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-ltr">${letters[i]}</span>${escHtml(opt)}`;
    btn.addEventListener('click',()=>pick(btn, opt, q.a, q.q));
    opts.appendChild(btn);
  });

  clearTimer();
  timeLeft = TIME_PER_Q;
  startTime = Date.now();
  setTimer(100);
  timerID = setInterval(()=>tickTimer(), 100);
}

function setTimer(pct){
  document.getElementById('timer-bar').style.width = pct+'%';
}

function tickTimer(){
  const elapsed = (Date.now()-startTime)/1000;
  const remaining = Math.max(0, TIME_PER_Q - elapsed);
  setTimer((remaining/TIME_PER_Q)*100);
  if(remaining<=0 && !answered){
    clearTimer();
    timeOut();
  }
}

function clearTimer(){
  if(timerID){clearInterval(timerID);timerID=null;}
}

function timeOut(){
  answered = true;
  const q = curQs[curIdx];
  wrong++;
  missed.push({q:q.q,a:q.a});
  document.querySelectorAll('.opt').forEach(btn=>{
    const txt = btn.textContent.slice(1).trim();
    if(txt===q.a) btn.className='opt reveal';
    else btn.className='opt';
    btn.disabled=true;
  });
  showFb(false,'⏱ Time\'s up! Answer: '+q.a);
  dotMark(curIdx,'no');
  totalSec += TIME_PER_Q;
  if(gameMode==='knockout') penaltySec += 30;
  if(gameMode==='endurance'){
    setTimeout(()=>endGame(),1200);
    return;
  }
  document.getElementById('nxt-btn').className='nxt-btn on';
}

function pick(btn, chosen, correct_a, qText){
  if(answered) return;
  answered = true;
  clearTimer();
  const elapsed = (Date.now()-startTime)/1000;
  totalSec += elapsed;

  const isRight = chosen===correct_a;
  document.querySelectorAll('.opt').forEach(b=>{
    const txt = b.textContent.slice(1).trim();
    b.disabled = true;
    if(txt===correct_a) b.className = 'opt'+(isRight&&b===btn?' correct':' reveal');
    else if(b===btn && !isRight) b.className='opt wrong';
  });

  if(isRight){
    correct++;
    dotMark(curIdx,'ok');
    showFb(true, randomRight()+' ¡Correcto! 🎉');
    burst(btn);
  } else {
    wrong++;
    missed.push({q:qText,a:correct_a});
    dotMark(curIdx,'no');
    showFb(false,'❌ La respuesta es: '+correct_a);
    if(gameMode==='knockout') penaltySec += 30;
    if(gameMode==='endurance'){
      setTimeout(()=>endGame(),1400);
      return;
    }
  }
  document.getElementById('ghdr-score').textContent = correct+' / '+curQs.length;
  document.getElementById('nxt-btn').className='nxt-btn on';
}

function showFb(ok,msg){
  const el = document.getElementById('fb-bar');
  el.className = 'fb-bar on '+(ok?'fbgood':'fbbad');
  el.textContent = msg;
}

function dotMark(i,cls){
  const d = document.getElementById('dot-'+i);
  if(d) d.className='qdot '+cls;
  const next = document.getElementById('dot-'+(i+1));
  if(next) next.className='qdot now';
}

function nextQ(){
  curIdx++;
  if(curIdx>=curQs.length){endGame();return;}
  showQ();
}

function quitGame(){
  clearTimer();
  show('levels');
}

function endGame(){
  clearTimer();
  const total = curQs.length;
  const answered_count = curIdx + (answered ? 1 : 0);
  const pct = Math.round(correct/total*100);
  const avgTime = answered_count>0 ? totalSec/answered_count : 0;
  const finalTime = totalSec + penaltySec;
  const tp = TOPICS[curTopic];

  if(gameMode==='normal'){
    let stars = 0;
    if(pct===100 && avgTime<=8)     stars=3;
    else if(pct>=80 && avgTime<=12) stars=3;
    else if(pct>=80)                stars=2;
    else if(pct>=50)                stars=1;
    else                            stars=0;
    setBest(tp.id, curLevel, stars);
    {
      // Arcade code — only on improvement
      const _tot = TOPICS.reduce((t,tp)=>t+tp.levels.reduce((s,_,i)=>s+getBest(tp.id,i),0),0);
      const _max = TOPICS.reduce((t,tp)=>t+(tp.levels.length*3),0);
      const _pct = Math.round((_tot/_max)*100);
      const _prevPct = parseInt(localStorage.getItem('esp3_completion_pct')||'0');
      if(_pct > _prevPct) {
        localStorage.setItem('esp3_completion_pct', _pct);
        if(typeof showArcadeCode==='function') showArcadeCode('review3', _pct);
      }
    }
    const xp = correct*10 + (stars===3?50:stars===2?25:stars===1?10:0);
    let emoji,title;
    if(pct===100){emoji='🏆';title='¡Perfecto!';}
    else if(pct>=80){emoji='🔥';title='¡Muy bien!';}
    else if(pct>=60){emoji='👍';title='¡Bien!';}
    else if(pct>=40){emoji='😅';title='Keep going!';}
    else{emoji='💪';title='Practise more!';}
    document.getElementById('res-em').textContent=emoji;
    document.getElementById('res-title').textContent=title;
    document.getElementById('res-frac').textContent=correct+'/'+total;
    document.getElementById('res-frac').style.color=pct>=80?'#2ecc71':pct>=50?'#f1c40f':'#e74c3c';
    document.getElementById('res-time').textContent='Avg time: '+avgTime.toFixed(1)+'s per question';
    document.getElementById('res-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
    document.getElementById('res-xp').textContent='+'+xp+' XP earned!';

  } else if(gameMode==='knockout'){
    const stored = parseFloat(localStorage.getItem('esp3_ko_'+tp.id+'_'+curLevel)||'0');
    const isNewBest = stored===0 || finalTime<stored;
    if(isNewBest) localStorage.setItem('esp3_ko_'+tp.id+'_'+curLevel, finalTime.toFixed(2));
    const bestTime = isNewBest ? finalTime : stored;
    const survived = wrong===0;
    document.getElementById('res-em').textContent = survived?'🥊':'💥';
    document.getElementById('res-title').textContent = survived?'Survived!':'Knocked out!';
    document.getElementById('res-frac').textContent = correct+' correct · '+wrong+' wrong';
    document.getElementById('res-frac').style.color = survived?'#27ae60':'#e74c3c';
    document.getElementById('res-time').textContent =
      '⏱ Final time: '+finalTime.toFixed(1)+'s'+(penaltySec>0?' (incl. '+penaltySec+'s penalty)':'')+
      ' · Best: '+bestTime.toFixed(1)+'s'+(isNewBest?' 🏆 New best!':'');
    document.getElementById('res-stars').textContent='';
    document.getElementById('res-xp').textContent='Lower time = better rank. Show the class your screen!';

  } else if(gameMode==='endurance'){
    const survived_count = correct;
    const stored = parseInt(localStorage.getItem('esp3_end_'+tp.id+'_'+curLevel)||'0');
    const isNewBest = survived_count>stored;
    if(isNewBest) localStorage.setItem('esp3_end_'+tp.id+'_'+curLevel, survived_count);
    const best = isNewBest ? survived_count : stored;
    const perfect = wrong===0 && curIdx>=total-1;
    document.getElementById('res-em').textContent = perfect?'🏆':survived_count>=Math.floor(total*0.7)?'🔥':survived_count>0?'💪':'😬';
    document.getElementById('res-title').textContent = perfect?'¡Perfecto! Full clear!':wrong>0?'Out on question '+(curIdx+1)+'!':'Survived '+survived_count+'!';
    document.getElementById('res-frac').textContent = survived_count+' survived / '+total+' total';
    document.getElementById('res-frac').style.color = perfect?'#27ae60':survived_count>0?'#f1c40f':'#e74c3c';
    document.getElementById('res-time').textContent = '⏱ Time: '+totalSec.toFixed(1)+'s · Personal best: '+best+' questions';
    document.getElementById('res-stars').textContent = perfect?'⭐⭐⭐':survived_count>=Math.floor(total*0.7)?'⭐⭐':survived_count>0?'⭐':'';
    document.getElementById('res-xp').textContent = isNewBest?'🏆 New personal best!':'Best: '+best+' questions. Can you beat it?';
  }

  if(missed.length){
    document.getElementById('missed-box').style.display='block';
    document.getElementById('missed-list').innerHTML=missed.map(m=>
      `<div class="missed-row"><div class="missed-q">${escHtml(m.q)}</div><div class="missed-a">✓ ${escHtml(m.a)}</div></div>`
    ).join('');
  } else {
    document.getElementById('missed-box').style.display='none';
  }
  show('results');
}
function replayGame(){startGame(curTopic,curLevel);}

// ── BURST ──
function burst(btn){
  const emojis=['⭐','✨','🌟','💫','🎉'];
  const rect = btn.getBoundingClientRect();
  for(let i=0;i<5;i++){
    const el=document.createElement('div');
    el.className='floater';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=(rect.left+rect.width/2-20+Math.random()*40-20)+'px';
    el.style.top=(rect.top+rect.height/2)+'px';
    el.style.animationDelay=(i*0.08)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
}

// ── UTILS ──
const praise=['¡Genial! 🌟','¡Excelente! 🎊','¡Fenomenal! 🔥','¡Olé! 💃','¡Fantástico! 🏆','¡Brillante! ⚡'];
function randomRight(){return praise[Math.floor(Math.random()*praise.length)];}
function shuffle(a){return a.sort(()=>Math.random()-0.5);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──
renderHome();
</script>
